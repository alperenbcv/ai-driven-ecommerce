server:
  port: 8088

spring:
  application:
    name: cargo-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/cargo_db
    username: ${POSTGRES_USER:ecommerce}
    password: ${POSTGRES_PASSWORD:ecommerce123}
    driver-class-name: org.postgresql.Driver

cargo:
  scheduler:
    interval-minutes: 10
  carriers:
    - MNG Kargo
    - Aras Kargo
    - Yurtiçi Kargo

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
