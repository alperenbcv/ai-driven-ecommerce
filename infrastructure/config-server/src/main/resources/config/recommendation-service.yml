server:
  port: 8090

spring:
  application:
    name: recommendation-service
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:ecommerce123}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/product_db
    username: ${POSTGRES_USER:ecommerce}
    password: ${POSTGRES_PASSWORD:ecommerce123}
    driver-class-name: org.postgresql.Driver
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small

recommendation:
  hybrid:
    graph-weight: 0.4
    vector-weight: 0.6
  top-n: 10

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
