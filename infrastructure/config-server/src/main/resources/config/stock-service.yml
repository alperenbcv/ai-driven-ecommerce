server:
  port: 8085

spring:
  application:
    name: stock-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/stock_db
    username: ${POSTGRES_USER:ecommerce}
    password: ${POSTGRES_PASSWORD:ecommerce123}
    driver-class-name: org.postgresql.Driver

stock:
  low-threshold: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
