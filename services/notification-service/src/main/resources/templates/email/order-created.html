<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Siparişiniz Alındı</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <tr>
            <td style="background:linear-gradient(135deg,#10b981,#059669);padding:40px 48px;text-align:center;">
              <h1 style="color:#ffffff;margin:0;font-size:28px;font-weight:700;">Siparişiniz Alındı!</h1>
              <p style="color:rgba(255,255,255,0.85);margin:8px 0 0;font-size:14px;">n12</p>
            </td>
          </tr>
          <tr>
            <td style="padding:48px;">
              <h2 style="color:#111827;font-size:22px;margin:0 0 16px;">Merhaba, <span th:text="${firstName}">Müşteri</span>!</h2>
              <p style="color:#6b7280;font-size:16px;line-height:1.6;margin:0 0 24px;">
                Siparişiniz başarıyla alındı. Hazırlanmaya başlıyoruz!
              </p>
              <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:24px;margin:0 0 24px;">
                <table width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="color:#6b7280;font-size:14px;">Sipariş No</td>
                    <td style="text-align:right;color:#111827;font-size:14px;font-weight:600;" th:text="${orderNumber}">#</td>
                  </tr>
                  <tr><td colspan="2" style="padding:8px 0;"><hr style="border:none;border-top:1px solid #d1fae5;"/></td></tr>
                  <tr>
                    <td style="color:#6b7280;font-size:14px;">Toplam Tutar</td>
                    <td style="text-align:right;color:#059669;font-size:18px;font-weight:700;"><span th:text="${totalAmount}">0</span> TL</td>
                  </tr>
                </table>
              </div>
              <p style="color:#9ca3af;font-size:14px;line-height:1.5;margin:0;">
                Siparişinizin durumunu hesabınızdan takip edebilirsiniz. Kargoya verildiğinde tekrar haber vereceğiz.
              </p>
            </td>
          </tr>
          <tr>
            <td style="background:#f9fafb;padding:24px 48px;text-align:center;border-top:1px solid #e5e7eb;">
              <p style="color:#9ca3af;font-size:12px;margin:0;">© 2026 n12. Tüm hakları saklıdır.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
