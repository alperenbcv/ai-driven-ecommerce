<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head><meta charset="UTF-8"/><title>Siparişiniz Kargoya Verildi</title></head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;padding:40px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
        <tr>
          <td style="background:linear-gradient(135deg,#3b82f6,#1d4ed8);padding:40px 48px;text-align:center;">
            <h1 style="color:#ffffff;margin:0;font-size:28px;font-weight:700;">Siparişiniz Yolda!</h1>
            <p style="color:rgba(255,255,255,0.85);margin:8px 0 0;font-size:14px;">n12</p>
          </td>
        </tr>
        <tr>
          <td style="padding:48px;">
            <h2 style="color:#111827;font-size:22px;margin:0 0 16px;">Merhaba, <span th:text="${firstName}">Müşteri</span>!</h2>
            <p style="color:#6b7280;font-size:16px;line-height:1.6;margin:0 0 24px;">
              Harika haber! Siparişiniz kargoya verildi ve yolculuğuna başladı.
            </p>
            <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:24px;margin:0 0 24px;">
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="color:#6b7280;font-size:14px;padding-bottom:12px;">Sipariş No</td>
                  <td style="text-align:right;color:#111827;font-size:14px;font-weight:600;padding-bottom:12px;" th:text="${orderNumber}">#</td>
                </tr>
                <tr>
                  <td style="color:#6b7280;font-size:14px;padding-bottom:12px;">Kargo Firması</td>
                  <td style="text-align:right;color:#111827;font-size:14px;font-weight:600;padding-bottom:12px;" th:text="${provider}">-</td>
                </tr>
                <tr>
                  <td style="color:#6b7280;font-size:14px;">Takip Numarası</td>
                  <td style="text-align:right;color:#1d4ed8;font-size:16px;font-weight:700;" th:text="${trackingNumber}">-</td>
                </tr>
              </table>
            </div>
            <p style="color:#9ca3af;font-size:14px;margin:0;">Siparişiniz kargo firmasının web sitesinden takip numarasıyla takip edilebilir.</p>
          </td>
        </tr>
        <tr>
          <td style="background:#f9fafb;padding:24px 48px;text-align:center;border-top:1px solid #e5e7eb;">
            <p style="color:#9ca3af;font-size:12px;margin:0;">© 2026 n12</p>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
