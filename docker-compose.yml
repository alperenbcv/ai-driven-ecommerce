version: '3.9'

services:
  # ─── PostgreSQL (with pgvector extension) ───────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Yalnızca DB oluşturma + extension. seed.sql buraya bağlanmamalı (tablolar Hibernate ile sonradan oluşur).
      - ./infrastructure/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ───────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-ecommerce123}
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.24-community
    container_name: ecommerce-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-ecommerce123}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Discovery Server (Eureka) ───────────────────────────────────────────────
  discovery-server:
    build:
      context: infrastructure/discovery-server
    image: ecommerce/discovery-server:latest
    container_name: ecommerce-discovery
    restart: unless-stopped
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Config Server ───────────────────────────────────────────────────────────
  config-server:
    build:
      context: infrastructure/config-server
    image: ecommerce/config-server:latest
    container_name: ecommerce-config
    restart: unless-stopped
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: infrastructure/api-gateway
    image: ecommerce/api-gateway:latest
    container_name: ecommerce-gateway
    restart: unless-stopped
    ports:
      - "8763:8763"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      RATE_LIMIT_REPLENISH_RATE: ${RATE_LIMIT_REPLENISH_RATE:-20}
      RATE_LIMIT_BURST_CAPACITY: ${RATE_LIMIT_BURST_CAPACITY:-40}
      LOGIN_RATE_LIMIT_REPLENISH_RATE: ${LOGIN_RATE_LIMIT_REPLENISH_RATE:-2}
      LOGIN_RATE_LIMIT_BURST_CAPACITY: ${LOGIN_RATE_LIMIT_BURST_CAPACITY:-5}
    depends_on:
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8763/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── User Service ─────────────────────────────────────────────────────────────
  user-service:
    build:
      context: services/user-service
    image: ecommerce/user-service:latest
    container_name: ecommerce-user
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Product Service ──────────────────────────────────────────────────────────
  product-service:
    build:
      context: services/product-service
    image: ecommerce/product-service:latest
    container_name: ecommerce-product
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Shopping Cart Service ────────────────────────────────────────────────────
  shopping-cart-service:
    build:
      context: services/shopping-cart-service
    image: ecommerce/shopping-cart-service:latest
    container_name: ecommerce-cart
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Order Service ────────────────────────────────────────────────────────────
  order-service:
    build:
      context: services/order-service
    image: ecommerce/order-service:latest
    container_name: ecommerce-order
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/order_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Stock Service ────────────────────────────────────────────────────────────
  stock-service:
    build:
      context: services/stock-service
    image: ecommerce/stock-service:latest
    container_name: ecommerce-stock
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stock_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Payment Service ──────────────────────────────────────────────────────────
  payment-service:
    build:
      context: services/payment-service
    image: ecommerce/payment-service:latest
    container_name: ecommerce-payment
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      DB_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Cargo Service ────────────────────────────────────────────────────────────
  cargo-service:
    build:
      context: services/cargo-service
    image: ecommerce/cargo-service:latest
    container_name: ecommerce-cargo
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/cargo_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Notification Service ─────────────────────────────────────────────────────
  notification-service:
    build:
      context: services/notification-service
    image: ecommerce/notification-service:latest
    container_name: ecommerce-notification
    restart: unless-stopped
    ports:
      - "8087:8087"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      SPRING_MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── Search Service ───────────────────────────────────────────────────────────
  search-service:
    build:
      context: ai-services/search-service
    image: ecommerce/search-service:latest
    container_name: ecommerce-search
    restart: unless-stopped
    ports:
      - "8091:8091"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/search_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Recommendation Service ───────────────────────────────────────────────────
  recommendation-service:
    build:
      context: ai-services/recommendation-service
    image: ecommerce/recommendation-service:latest
    container_name: ecommerce-recommendation
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-ecommerce}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-ecommerce123}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: ${NEO4J_PASSWORD:-ecommerce123}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recommendation_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ecommerce}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      config-server:
        condition: service_healthy

  # ─── AI Assistant Service ─────────────────────────────────────────────────────
  assistant-service:
    build:
      context: ai-services/assistant-service
    image: ecommerce/assistant-service:latest
    container_name: ecommerce-assistant
    restart: unless-stopped
    ports:
      - "8092:8092"
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka123@discovery-server:8761/eureka/
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ORDER_SERVICE_URL: http://order-service:8084
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:8090
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  neo4j_data:

networks:
  default:
    name: ecommerce-network
