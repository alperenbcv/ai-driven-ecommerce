name: CI — Build & Test

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-and-test:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecommerce
          POSTGRES_PASSWORD: ecommerce123
          POSTGRES_DB: ecommerce_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & Test
        run: ./mvnw verify --batch-mode -T 1C
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5432/ecommerce_test
          SPRING_DATASOURCE_USERNAME: ecommerce
          SPRING_DATASOURCE_PASSWORD: ecommerce123
          SPRING_REDIS_HOST:          localhost
          OPENAI_API_KEY:             dummy-key-for-ci

      - name: Surefire raporlarını yükle (hata varsa)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7
